name: android_ide
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  # Navigation & Routing
  go_router: ^14.2.0

  # State Management
  flutter_bloc: ^8.1.6
  flutter_riverpod: ^2.5.1

  # Code Editor
  re_editor: ^0.10.0
  re_highlight: ^0.0.3

  # Terminal Simulation
  xterm: ^4.0.0
  flutter_pty: ^0.4.2

  # Git & Credentials
  git2dart: ^0.5.2
  flutter_secure_storage: ^9.2.2

  # Database & Filesystem
  isar: ^3.1.0
  isar_flutter_libs: ^3.1.0
  path_provider: ^2.1.3
  path: ^1.9.0
  file_picker: ^8.0.0
  watcher: ^1.1.0
  permission_handler: ^11.3.1

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter

  isar_generator: ^3.1.0
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
